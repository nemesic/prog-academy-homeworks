<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Karla', sans-serif; }
    </style>
</head>
<body class="bg-[#84C7AE] flex items-center justify-center min-h-screen">
    <div class="bg-[#F6FBF9] w-[698px] h-[698px] rounded-[49.09px] p-10 shadow-2xl">
        <div class="flex flex-col justify-between h-full min-h-[500px]">
            <div class="space-y-4">
                <h1 class="text-[32px] sm:text-[55.23px] font-bold leading-tight sm:leading-[71.79px] text-center text-[#32403B]">Create An Account</h1>
                <p class="text-[16px] sm:text-[23.01px] font-normal leading-[22px] sm:leading-[29.91px] text-center text-[#32403B]">Create an account to enjoy all the services without any ads for free!</p>
            </div>
            <form class="space-y-4 sm:space-y-6 mt-6">
                <div>
                    <input type="email" id="email" name="email" class="w-full sm:w-[575.27px] sm:h-[84.37px] rounded-[15.34px] border-[1.53px] border-[#D1D5DB] bg-white px-4 sm:px-5 py-3 sm:py-0 text-[16px] sm:text-[18px] text-[#32403B] focus:border-[#32403B] focus:outline-none focus:ring-2 focus:ring-[#32403B]/20 mx-auto flex items-center" placeholder="Email Address" required>
                </div>
                <div>
                    <input type="password" id="password" name="password" class="w-full sm:w-[575.27px] sm:h-[84.37px] rounded-[15.34px] border-[1.53px] border-[#D1D5DB] bg-white px-4 sm:px-5 py-3 sm:py-0 text-[16px] sm:text-[18px] text-[#32403B] focus:border-[#32403B] focus:outline-none focus:ring-2 focus:ring-[#32403B]/20 mx-auto flex items-center" placeholder="Password" required>
                </div>
                <button type="submit" class="w-full sm:w-[391.19px] sm:h-[90.51px] rounded-[23.01px] bg-[#84C7AE] py-3 sm:py-0 text-[20px] sm:text-[33.75px] font-bold leading-[28px] sm:leading-[43.87px] text-[#FFFFFF] shadow-sm transition hover:bg-[#D1D5DB] mx-auto flex items-center justify-center">Create Account</button>
            </form>
            <p class="text-center text-[16px] sm:text-[21.48px] font-normal leading-[22px] sm:leading-[27.92px] text-[#32403B] mt-4">Already have an account? <a href="#" class="font-bold text-[#32403B]">Sign In</a></p>
        </div>
    </div>
</body>
</html>
