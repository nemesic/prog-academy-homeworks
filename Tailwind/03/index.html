<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer UI</title>
  <link href="./styles/style.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="theme-default min-h-screen flex flex-col items-center justify-center">

  <div class="flex gap-4 mb-6">
    <button id="defaultThemeBtn" class="px-4 py-2 rounded bg-gray-400 text-black font-semibold">Default</button>
    <button id="lightThemeBtn" class="px-4 py-2 rounded bg-yellow-200 text-black font-semibold">Light</button>
    <button id="darkThemeBtn" class="px-4 py-2 rounded bg-gray-800 text-white font-semibold">Dark</button>
  </div>

  <div class="timer-card flex items-center justify-center relative mb-8">
    <svg class="absolute left-0 top-0" width="300" height="300">
      <circle class="ring-bg ring-bg-default" cx="150" cy="150" r="138"/>
      <circle class="ring-progress ring-progress-default" cx="150" cy="150" r="138"/>
    </svg>
    <div id="time" class="time select-none">25:00</div>
  </div>
  <div class="flex gap-6 mb-8">
    <button id="startBtn" class="bg-[#FFA500] text-white px-8 py-3 rounded-full text-lg font-semibold hover:bg-[#fff] hover:text-black transition">Start</button>
    <button id="resetBtn" class="bg-[#FFA500] text-white px-8 py-3 rounded-full text-lg font-semibold hover:bg-[#fff] hover:text-black transition">Reset</button>
  </div>

  <script>
    const ring = document.querySelector('.ring-progress');
    const ringBg = document.querySelector('.ring-bg');
    const timeDisplay = document.getElementById('time');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const RADIUS = 138;
    const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
    ring.style.strokeDasharray = `${CIRCUMFERENCE} ${CIRCUMFERENCE}`;
    ring.style.strokeDashoffset = CIRCUMFERENCE;

    const TOTAL_TIME = 25 * 60;
    let timeLeft = TOTAL_TIME;
    let interval = null;

    function setProgress(percent) {
      const offset = CIRCUMFERENCE - (percent / 100) * CIRCUMFERENCE;
      ring.style.strokeDashoffset = offset;
    }

    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const seconds = (timeLeft % 60).toString().padStart(2, '0');
      timeDisplay.textContent = `${minutes}:${seconds}`;
      setProgress((timeLeft / TOTAL_TIME) * 100);
    }

    startBtn.onclick = function () {
      if (interval) return;
      interval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(interval);
          interval = null;
          alert("Час вийшов!");
          timeLeft = TOTAL_TIME;
          updateDisplay();
        }
      }, 1000);
    };

    resetBtn.onclick = function () {
      clearInterval(interval);
      interval = null;
      timeLeft = TOTAL_TIME;
      updateDisplay();
    };

    document.getElementById('defaultThemeBtn').onclick = function() {
      ring.className = 'ring-progress ring-progress-default';
      ringBg.className = 'ring-bg ring-bg-default';
      document.body.className = 'theme-default min-h-screen flex flex-col items-center justify-center';
      timeDisplay.className = 'time select-none';
    };
    document.getElementById('lightThemeBtn').onclick = function() {
      ring.className = 'ring-progress ring-progress-light';
      ringBg.className = 'ring-bg ring-bg-light';
      document.body.className = 'theme-light min-h-screen flex flex-col items-center justify-center';
      timeDisplay.className = 'time select-none';
    };
    document.getElementById('darkThemeBtn').onclick = function() {
      ring.className = 'ring-progress ring-progress-dark';
      ringBg.className = 'ring-bg ring-bg-dark';
      document.body.className = 'theme-dark min-h-screen flex flex-col items-center justify-center';
      timeDisplay.className = 'time select-none';
    };

    updateDisplay();
  </script>
</body>
</html>
