<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <section class="card">
            <h2>Ланцюжок promise</h2>
            <input type="number" id="task1Input" placeholder="Введіть число">
            <button id="task1Btn">Запустити</button>
            <p id="task1Output"></p>
        </section>

        <section class="card">
            <h2>Перетворення тексту</h2>
            <input type="text" id="task2Input" placeholder="Введіть текст">
            <button id="task2Btn">Запустити</button>
            <p id="task2Output"></p>
        </section>

        <section class="card">
            <h2>Порівняння чисел</h2>
            <input type="number" id="num1" placeholder="Число 1">
            <input type="number" id="num2" placeholder="Число 2">
            <button id="task3Btn">Порівняти</button>
            <p id="task3Output"></p>
        </section>

    </div>

    <script src="main.js"></script>
</body>
</html>
