<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <section class="card">
            <h2>Список користувачів</h2>
            <button id="loadUsersBtn">Завантажити користувачів</button>
            <ul id="usersList"></ul>
        </section>

        <section class="card">
            <h2>Деталі одного користувача</h2>
            <button id="loadUserBtn">Завантажити користувача #1</button>
            <div id="userDetail"></div>
        </section>

        <section class="card">
            <h2>Пості користувача</h2>
            <button id="loadPostsBtn">Завантажити пості</button>
            <ul id="postsList"></ul>
        </section>

        <section class="card">
            <h2>Дані планети з SWAPI</h2>
            <button id="loadPlanetBtn">Завантажити планету #1</button>
            <div id="planetCard"></div>
        </section>

    </div>

    <script src="main.js"></script>
</body>

</html>
