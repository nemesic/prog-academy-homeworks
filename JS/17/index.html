<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Завдання 1: Конвертер валют</h2>
    <div class="converter">
        <input type="number" id="amount" placeholder="Сума">
        <input type="number" id="rate" placeholder="Курс обміну">
        <button id="convertBtn">Конвертувати</button>
        <p id="convertResult"></p>
    </div>

    <hr>

    <h2>Завдання 2: Динамічний список задач</h2>
    <div class="todoApp">
        <input type="text" id="taskInput" placeholder="Нова задача">
        <button id="addTaskBtn">Додати</button>
        <ul id="taskList"></ul>
    </div>

    <script src="main.js"></script>
    
</body>
</html>
