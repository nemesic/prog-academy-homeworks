<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="card">
        <h2>1. onclick</h2>
        <button id="colorBtn">Змінити колір тексту</button>
        <p id="text">Це текст який змінює колір</p>
    </section>

    <section class="card">
        <h2>2. ondblclick</h2>
        <div id="resizeBox">Double click</div>
    </section>

    <section class="card">
        <h2>3. addEventListener і removeEventListener</h2>
        <button id="countBtn">Клік</button>
        <p id="counter">0</p>
    </section>

    <section class="card">
        <h2>4. Видалення елементів</h2>
        <div id="elementsContainer"></div>
    </section>

    <section class="card">
        <h2>5. event.target</h2>
        <div class="blockContainer"> 
            <button class="button first">First</button>
            <button class="button second">Second</button>
            <button class="button third">Third</button>
        </div>
    </section>

    <script src="main.js"></script>
</body>

</html>
