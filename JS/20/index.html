<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Завдання 1: Повідомлення через час</h2>
    <button id="showMessageBtn">Показати повідомлення через 3 секунди</button>

    <h2>Завдання 2: Лічильник</h2>
    <button id="startCounterBtn">Запустити лічильник</button>
    <p id="counterDisplay">0</p>

    <h2>Завдання 3: Змінити фон на випадковий</h2>
    <button id="randomColorBtn">Змінити колір фону</button>

    <h2>Додаткове: Таймер Pomodoro</h2>
    <div id="pomodoroContainer">
        <svg class="progress-ring" width="210" height="210">
            <circle class="progress-ring__circle" r="90" cx="105" cy="105" />
        </svg>
        <div id="timerDisplay">25:00</div>
        <div class="buttons">
            <button class="startBtn" id="startBtn">Start</button>
            <button class="resetBtn" id="resetBtn">Reset</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
